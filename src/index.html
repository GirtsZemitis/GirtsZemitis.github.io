<!DOCTYPE html>

<body>
    <div>
        <iframe id="monthio" width="420px" height="700px" src=""></iframe>

        document.getElementById('monthio').src = 'https://smartcheck.monthio.com/?clientid=90633&userid=' + 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
